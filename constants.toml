ACCOUNTS_DISCRIMINANT = 1
CHAIN_STATE_DISCRIMINANT = 2
OPERATOR_INCENTIVES_DISCRIMINANT = 3
BLOB_STORAGE_DISCRIMINANT = 4
PROVER_INCENTIVES_DISCRIMINANT = 5
SEQUENCER_REGISTRY_DISCRIMINANT = 6
UNIQUENESS_DISCRIMINANT = 7
HYPERLANE_DISCRIMINANT = 8
ATTESTER_INCENTIVES_DISCRIMINANT = 9
BLOB_SELECTOR_DISCRIMINANT = 10
EVM_DISCRIMINANT = 11
MAILBOX_DISCRIMINANT = 12
INTERCHAIN_GAS_PAYMASTER_DISCRIMINANT = 13
MERKLE_TREE_HOOK_DISCRIMINANT = 14
WARP_DISCRIMINANT = 15
PAYMASTER_DISCRIMINANT = 16
REVENUE_SHARE_DISCRIMINANT = 17
SOLANA_REGISTRATION_DISCRIMINANT = 18
SESSION_REGISTRY_DISCRIMINANT = 19
BLACKLIST_DISCRIMINANT = 20

# Ligate-native module discriminants (start at 21, increment per
# module). Ordering established here is the canonical wire-level
# stable ordering. Names are snake_case of the struct type that
# carries the `#[id]`-marked field; the SDK derives the lookup key
# from the type name. Our struct is `AttestationModule`, hence
# `ATTESTATION_MODULE_DISCRIMINANT`.
ATTESTATION_MODULE_DISCRIMINANT = 21

